<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ??</title><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet"><style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at 30% 20%, #1a001a, #000 70%);
overflow:hidden;
color:#ff6fa5;
}

/* FONDO */
canvas{
position:fixed;
top:0;left:0;
z-index:0;
opacity:0.6;
}

/* CENTRADO */
.seccion{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:2;
transition:0.8s;
}

/* TARJETA */
.card{
width:90%;
max-width:380px;
background: rgba(255,255,255,0.04);
padding:35px 30px;
border-radius:25px;
border:1px solid rgba(255,105,180,0.4);
box-shadow:
0 0 25px rgba(255,105,180,0.4),
0 0 60px rgba(255,105,180,0.15);
backdrop-filter: blur(12px);
text-align:center;
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(25px) scale(0.97)}
to{opacity:1; transform:translateY(0) scale(1)}
}

/* TITULO */
h1{
font-family:'Great Vibes',cursive;
font-size:52px;
margin-bottom:10px;
text-shadow:0 0 15px rgba(255,105,180,0.6);
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:20px;
border:1px solid rgba(255,105,180,0.4);
background:transparent;
color:white;
outline:none;
margin-top:10px;
box-shadow:0 0 10px rgba(255,105,180,0.3);
}

/* BOTON */
button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff4d88,#ff6fa5);
color:white;
cursor:pointer;
box-shadow:0 0 15px rgba(255,105,180,0.5);
transition:0.25s;
}
button:hover{transform:scale(1.04)}

/* CARTA */
#carta{display:none}

/* TEXTO */
#textoCarta{
white-space:pre-line;
line-height:1.6;
font-size:14px;
text-shadow:0 0 6px rgba(255,105,180,0.4);
}

/* FINAL */
#final{
display:none;
position:absolute;
width:100%;
height:100vh;
z-index:2;
}

/* FOTO */
.foto{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.9);
width:240px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,105,180,0.6);
animation:zoom 2.5s ease forwards;
}

@keyframes zoom{
to{transform:translate(-50%,-50%) scale(1)}
}

/* CONTADOR */
#contador{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
font-size:18px;
opacity:0.8;
text-shadow:0 0 8px rgba(255,105,180,0.5);
}
</style></head><body><canvas id="bg"></canvas>

<!-- LOGIN --><div id="login" class="seccion">
<div class="card">
<h1>Para ti ??</h1>
<p>Ingresa la contraseña</p>
<input type="password" id="clave">
<button onclick="verificar()">Entrar</button>
</div>
</div><!-- CARTA --><div id="carta" class="seccion">
<div class="card">
<p id="textoCarta"></p>
<button onclick="mostrarFinal()">Continuar ??</button>
</div>
</div><!-- FINAL --><div id="final">
<img src="foto.jpg" class="foto">
<div id="contador"></div>
</div><script>

/* LOGIN */
function verificar(){
if(document.getElementById("clave").value==="25/04/2025"){
fade("login","carta");
escribir();
}
}

/* ESCRITURA NATURAL */
let msg=`Para la persona que hace latir mi corazón ??

Me haces feliz incluso en los días simples.
Tu forma de ser, tu risa… todo.

Gracias por existir en mi vida.`;

function escribir(){
let i=0;
function t(){
if(i<msg.length){
document.getElementById("textoCarta").innerHTML+=msg[i];
i++;
setTimeout(t,35);
}}
t();
}

/* FINAL */
function mostrarFinal(){
fade("carta","final");
contador();
}

/* TRANSICIÓN */
function fade(a,b){
document.getElementById(a).style.opacity=0;
setTimeout(()=>{
document.getElementById(a).style.display="none";
document.getElementById(b).style.display="flex";
},700);
}

/* CONTADOR */
function contador(){
let fecha=new Date("2026-04-25");
setInterval(()=>{
let diff=fecha-new Date();
let d=Math.floor(diff/(1000*60*60*24));
document.getElementById("contador").innerHTML=d+" días ??";
},1000);
}

/* PARTÍCULAS FINAS */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<40;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*2});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(255,105,180,0.7)";
p.forEach(e=>{
ctx.fillText("•",e.x,e.y);
e.y-=0.3;
if(e.y<0)e.y=c.height;
});
requestAnimationFrame(draw);
}
draw();

</script></body>
</html>
