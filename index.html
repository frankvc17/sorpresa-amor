 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
font-family:'Poppins',sans-serif;
overflow:hidden;
color:#ff6fa5;
}

/* CANVAS */
canvas{
position:fixed;
top:0;left:0;
z-index:0;
}

/* SECCIONES */
.seccion{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
transition:1s;
}

/* TITULO */
h1{
font-family:'Great Vibes';
font-size:70px;
text-shadow:0 0 30px #ff4d88;
}

/* INPUT */
input{
padding:12px;
border-radius:20px;
border:1px solid #ff6fa5;
background:transparent;
color:white;
box-shadow:0 0 15px #ff6fa5;
}

/* BOTON */
button{
margin-top:15px;
padding:12px 35px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff4d88,#ff6fa5);
color:white;
cursor:pointer;
box-shadow:0 0 25px #ff4d88;
transition:0.3s;
}
button:hover{transform:scale(1.1)}

/* CARTA */
#carta{display:none}
.carta-box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
border:1px solid #ff4d88;
box-shadow:0 0 40px #ff4d88;
max-width:700px;
}

/* CURSOR */
.cursor{
display:inline-block;
width:2px;
background:#ff6fa5;
animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0}}

/* LOADING */
#loading{display:none}
.barra{
width:250px;height:10px;
background:#222;border-radius:20px;
overflow:hidden;
}
.progreso{
height:100%;
background:#ff6fa5;
width:0%;
}

/* FOTO */
.foto{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.8);
width:260px;
border-radius:20px;
box-shadow:0 0 50px #ff4d88;
animation:zoom 3s forwards;
z-index:2;
}
@keyframes zoom{
to{transform:translate(-50%,-50%) scale(1)}
}

/* CONTADOR */
#contador{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:22px;
text-shadow:0 0 10px #ff4d88;
}

/* EXPLOSION */
.explosion{
position:absolute;
font-size:20px;
animation:boom 2s forwards;
}
@keyframes boom{
to{
transform:translateY(-200px) scale(2);
opacity:0;
}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="login" class="seccion">
<h1>Para ti 💖</h1>
<input type="password" id="clave">
<button onclick="verificar()">Entrar</button>
</div>

<div id="carta" class="seccion">
<div class="carta-box">
<p id="textoCarta"></p><span class="cursor"></span>
<button onclick="cargar()">Continuar 💖</button>
</div>
</div>

<div id="loading" class="seccion">
<h2>Preparando algo especial... 💕</h2>
<div class="barra"><div class="progreso" id="prog"></div></div>
</div>

<div id="final" style="display:none">
<img src="foto.jpg" class="foto">
<div id="contador"></div>
</div>

<script>

/* LOGIN */
function verificar(){
if(document.getElementById("clave").value==="25/04/2025"){
fade("login","carta");
escribir();
}
}

/* ESCRITURA */
let msg="Eres lo mejor que me ha pasado 💖";
function escribir(){
let i=0;
function t(){
if(i<msg.length){
document.getElementById("textoCarta").innerHTML+=msg[i];
i++;
setTimeout(t,40);
}}
t();
}

/* CARGA */
function cargar(){
fade("carta","loading");
let p=0;
let barra=document.getElementById("prog");

let interval=setInterval(()=>{
p+=2;
barra.style.width=p+"%";
if(p>=100){
clearInterval(interval);
fade("loading","final");
contador();
explosion();
}
},50);
}

/* FADE */
function fade(a,b){
document.getElementById(a).style.opacity=0;
setTimeout(()=>{
document.getElementById(a).style.display="none";
document.getElementById(b).style.display="flex";
},800);
}

/* CONTADOR */
function contador(){
let f=new Date("2026-04-25");
setInterval(()=>{
let d=f-new Date();
let dias=Math.floor(d/86400000);
document.getElementById("contador").innerHTML=dias+" días 💖";
},1000);
}

/* EXPLOSION */
function explosion(){
for(let i=0;i<30;i++){
let e=document.createElement("div");
e.className="explosion";
e.innerHTML="💖";
e.style.left=Math.random()*100+"vw";
e.style.top="80vh";
document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);
}
}

/* PARTICULAS CANVAS */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let hearts=[];
for(let i=0;i<50;i++){
hearts.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
s:Math.random()*3+1,
v:Math.random()*1+0.5
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#ff4d88";

hearts.forEach(h=>{
ctx.fillText("💖",h.x,h.y);
h.y-=h.v;
if(h.y<0)h.y=c.height;
});

requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
